
<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
    <style>
        .box {
            width: 300px;
            padding: 20px;
            border: 1px solid black;
            margin: 100px auto;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 8px 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h3>User Details</h3>

        <input type="text" placeholder="anjali"><br>

        <input type="tel" placeholder="8341494526"><br>

        <button type="submit">Submit</button>
    </div>

</body>
</html>
